<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鱼缸的动物们 - Aquariums vs Bubbles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a4a6e 0%, #0d2d42 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', 'Comic Neue', 'Poppins', system-ui, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
(function() {
    // ========== 常量定义 ==========
    const GAME_WIDTH = 1920;
    const GAME_HEIGHT = 1080;

    // 游戏状态
    const GameState = {
        MENU: 'MENU',
        ADVENTURE: 'ADVENTURE'
    };

    // 守卫鱼类型
    const DefenderType = {
        CLOWN_FISH: { id: 'clown_fish', name: '小丑鱼', cost: 100, cooldown: 3000, color: '#FF6B35', attackType: 'bubble' },
        ANGELFISH: { id: 'angel_fish', name: '神仙鱼', cost: 150, cooldown: 5000, color: '#9B59B6', attackType: 'electric' },
        BETTA_FISH: { id: 'betta_fish', name: '斗鱼', cost: 125, cooldown: 2000, color: '#E74C3C', attackType: 'melee' },
        CLEANER_FISH: { id: 'cleaner_fish', name: '清道夫', cost: 75, cooldown: 4000, color: '#3498DB', attackType: 'clean' }
    };

    // ========== 游戏状态变量 ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    let currentState = GameState.MENU;
    let bubbles = 150;       // 气泡资源
    let pearls = 0;          // 珍珠资源
    let currentLevel = '1-1';
    let currentWave = 1;
    let totalWaves = 5;
    let isPaused = false;
    let isSpeedUp = false;

    // 卡牌相关
    let cardDeck = [];
    let selectedCard = null;
    let nextCard = null;

    // 守卫鱼放置
    let placedDefenders = [];

    // 按钮区域
    let menuButtons = [];
    let cardSlots = [];
    let topButtons = [];

    // ========== 初始化 ==========
    function init() {
        initCardDeck();
        initButtons();
        canvas.addEventListener('click', onCanvasClick);
        requestAnimationFrame(gameLoop);
    }

    function initCardDeck() {
        cardDeck = [
            { ...DefenderType.CLOWN_FISH, cooldownTimer: 0 },
            { ...DefenderType.ANGELFISH, cooldownTimer: 0 },
            { ...DefenderType.BETTA_FISH, cooldownTimer: 0 },
            { ...DefenderType.CLEANER_FISH, cooldownTimer: 0 },
            { ...DefenderType.CLOWN_FISH, cooldownTimer: 0 },
            { ...DefenderType.CLEANER_FISH, cooldownTimer: 0 }
        ];
        nextCard = { ...DefenderType.CLOWN_FISH };
    }

    function initButtons() {
        // 主菜单按钮 - 右侧珊瑚礁模式选择
        menuButtons = [
            { x: 1550, y: 380, w: 280, h: 100, text: '冒险模式', action: () => switchState(GameState.ADVENTURE) },
            { x: 1550, y: 500, w: 280, h: 100, text: '迷你游戏', action: () => {} },
            { x: 1550, y: 620, w: 280, h: 100, text: '益智模式', action: () => {} }
        ];

        // 冒险模式顶部按钮
        topButtons = [
            { x: 1700, y: 60, w: 80, h: 80, text: '⏸️', action: () => isPaused = !isPaused },
            { x: 1810, y: 60, w: 80, h: 80, text: '⏩', action: () => isSpeedUp = !isSpeedUp }
        ];

        // 底部卡牌槽
        cardSlots = [];
        const cardWidth = 120;
        const cardHeight = 160;
        const cardY = 920;
        const startX = (GAME_WIDTH - (cardWidth * 6 + 50 * 5)) / 2;
        for (let i = 0; i < 6; i++) {
            cardSlots.push({
                x: startX + i * (cardWidth + 50),
                y: cardY,
                w: cardWidth,
                h: cardHeight,
                cardIndex: i
            });
        }
    }

    // ========== 状态切换 ==========
    function switchState(newState) {
        currentState = newState;
        if (newState === GameState.MENU) {
            initCardDeck();
            placedDefenders = [];
        }
    }

    // ========== 鼠标点击处理 ==========
    function onCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (e.clientX - rect.left) * scaleX;
        const clickY = (e.clientY - rect.top) * scaleY;

        if (currentState === GameState.MENU) {
            handleMenuClick(clickX, clickY);
        } else if (currentState === GameState.ADVENTURE) {
            handleAdventureClick(clickX, clickY);
        }
    }

    function handleMenuClick(x, y) {
        for (let btn of menuButtons) {
            if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                btn.action();
                return;
            }
        }

        // 左下角功能按钮
        const bottomBtns = [
            { x: 180, y: 920, w: 120, h: 120, action: () => {} },  // 商店
            { x: 350, y: 920, w: 120, h: 120, action: () => {} },  // 选项
            { x: 520, y: 920, w: 120, h: 120, action: () => {} },  // 帮助
            { x: 690, y: 920, w: 120, h: 120, action: () => switchState(GameState.MENU) }  // 退出
        ];
        for (let btn of bottomBtns) {
            if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                btn.action();
                return;
            }
        }
    }

    function handleAdventureClick(x, y) {
        // 检查顶部按钮
        for (let btn of topButtons) {
            if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
                btn.action();
                return;
            }
        }

        // 检查卡牌槽
        for (let slot of cardSlots) {
            if (x >= slot.x && x <= slot.x + slot.w && y >= slot.y && y <= slot.y + slot.h) {
                const card = cardDeck[slot.cardIndex];
                if (card && card.cooldownTimer <= 0 && bubbles >= card.cost) {
                    selectedCard = card;
                }
                return;
            }
        }

        // 检查放置守卫鱼
        if (selectedCard && y > 150 && y < 850) {
            const laneWidth = 280;
            const laneIndex = Math.floor(x / laneWidth);
            if (laneIndex >= 0 && laneIndex < 5) {
                placeDefender(laneIndex, selectedCard);
                selectedCard = null;
            }
        }

        // 返回菜单按钮
        if (x >= 50 && x <= 150 && y >= 50 && y <= 120) {
            switchState(GameState.MENU);
        }
    }

    function placeDefender(laneIndex, defenderType) {
        bubbles -= defenderType.cost;
        const laneX = laneIndex * 280 + 140;
        placedDefenders.push({
            type: defenderType,
            x: laneX,
            y: 350 + laneIndex * 100,
            lastAttack: 0
        });
        defenderType.cooldownTimer = defenderType.cooldown;
    }

    // ========== 绘制函数 ==========
    function draw() {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        if (currentState === GameState.MENU) {
            drawMenu();
        } else if (currentState === GameState.ADVENTURE) {
            drawAdventure();
        }
    }

    // ========== 主菜单绘制 ==========
    function drawMenu() {
        drawUnderwaterBackground();
        drawAquariumScene();
        drawMenuUI();
    }

    function drawUnderwaterBackground() {
        // 渐变背景
        const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
        bgGrad.addColorStop(0, '#4A90D9');
        bgGrad.addColorStop(0.5, '#2E6B8A');
        bgGrad.addColorStop(1, '#1A4A6E');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // 气泡
        drawBubbles();
    }

    function drawBubbles() {
        const time = Date.now() / 1000;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        for (let i = 0; i < 40; i++) {
            const bx = (i * 137 + Math.sin(time + i) * 20) % GAME_WIDTH;
            const by = (i * 89 + Math.sin(time * 0.7 + i) * 30) % GAME_HEIGHT;
            const br = 3 + (i % 8);
            ctx.beginPath();
            ctx.arc(bx, by, br, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawAquariumScene() {
        // 底部沙子
        const sandGrad = ctx.createLinearGradient(0, 800, 0, GAME_HEIGHT);
        sandGrad.addColorStop(0, '#E8D5A3');
        sandGrad.addColorStop(1, '#C4A66A');
        ctx.fillStyle = sandGrad;
        ctx.beginPath();
        ctx.moveTo(0, 850);
        ctx.quadraticCurveTo(300, 830, 600, 860);
        ctx.quadraticCurveTo(900, 840, 1200, 855);
        ctx.quadraticCurveTo(1500, 835, GAME_WIDTH, 850);
        ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
        ctx.lineTo(0, GAME_HEIGHT);
        ctx.fill();

        // 彩色鹅卵石
        const pebbles = [
            { x: 200, y: 920, r: 20, c: '#E74C3C' },
            { x: 280, y: 950, r: 25, c: '#3498DB' },
            { x: 450, y: 930, r: 18, c: '#2ECC71' },
            { x: 700, y: 960, r: 22, c: '#9B59B6' },
            { x: 1100, y: 940, r: 20, c: '#F39C12' },
            { x: 1400, y: 970, r: 24, c: '#1ABC9C' }
        ];
        for (let p of pebbles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.c;
            ctx.fill();
        }

        // 水草
        drawSeaweed(150, 850, 0.8);
        drawSeaweed(400, 870, 1.0);
        drawSeaweed(650, 840, 0.9);
        drawSeaweed(950, 860, 1.1);
        drawSeaweed(1250, 850, 0.85);
        drawSeaweed(1550, 880, 1.0);

        // 珊瑚
        drawCoral(100, 870, 0.6);
        drawCoral(800, 850, 0.8);
        drawCoral(1700, 860, 0.7);
    }

    function drawSeaweed(x, baseY, scale) {
        const time = Date.now() / 1000;
        ctx.strokeStyle = '#2ECC71';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';

        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(x + i * 20, baseY);
            const sway = Math.sin(time * 1.5 + i + x) * 15;
            ctx.quadraticCurveTo(
                x + i * 20 + sway, baseY - 100 * scale,
                x + i * 20 + sway * 1.5, baseY - 180 * scale
            );
            ctx.stroke();
        }
    }

    function drawCoral(x, y, scale) {
        ctx.fillStyle = '#FF6B81';
        // 分支珊瑚
        for (let i = 0; i < 5; i++) {
            const angle = -Math.PI / 2 + (i - 2) * 0.4;
            const len = 60 * scale;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
            ctx.lineTo(x + Math.cos(angle) * len + 10, y + Math.sin(angle) * len + 10);
            ctx.lineTo(x + 5, y + 10);
            ctx.fill();
        }
    }

    function drawMenuUI() {
        // 左上角用户区域
        drawUserPanel();

        // 中央水母雕像
        drawJellyfishStatue(350, 500);

        // 左侧按钮
        drawLeftButtons();

        // 右侧模式选择
        drawModeSelector();

        // 底部功能按钮
        drawBottomButtons();
    }

    function drawUserPanel() {
        // 珊瑚标牌背景
        ctx.fillStyle = '#8B5A2B';
        roundRect(60, 50, 320, 180, 20);
        ctx.fill();

        // 木纹
        ctx.strokeStyle = '#6B4423';
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.moveTo(70, 70 + i * 35);
            ctx.lineTo(370, 70 + i * 35);
            ctx.stroke();
        }

        // 欢迎文字
        ctx.fillStyle = '#FFE4B5';
        ctx.font = 'bold 32px Quicksand';
        ctx.fillText('欢迎回来，XIAO ZHUI!', 90, 120);

        ctx.font = '22px Quicksand';
        ctx.fillStyle = '#DDD';
        ctx.fillText('点击这里，更改用户', 90, 160);

        ctx.fillStyle = '#87CEEB';
        ctx.fillText('🎉 泡泡大头贴！打造你的专属小鱼！', 90, 200);

        // 游戏标题
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 48px Quicksand';
        ctx.fillText('🐙 Aquarium vs. Bubbles 🐠', 60, 280);
    }

    function drawJellyfishStatue(x, y) {
        const time = Date.now() / 1000;

        // 底座
        ctx.fillStyle = '#A0A0A0';
        ctx.beginPath();
        ctx.ellipse(x, y + 80, 80, 30, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#808080';
        ctx.fillRect(x - 60, y + 50, 120, 40);

        // 银色水母
        ctx.fillStyle = 'rgba(200, 200, 220, 0.8)';
        // 头部
        ctx.beginPath();
        ctx.ellipse(x, y, 60, 50, 0, 0, Math.PI * 2);
        ctx.fill();

        // 触须
        ctx.strokeStyle = 'rgba(200, 200, 220, 0.6)';
        ctx.lineWidth = 4;
        for (let i = 0; i < 6; i++) {
            const tx = x - 40 + i * 16;
            const sway = Math.sin(time * 2 + i) * 10;
            ctx.beginPath();
            ctx.moveTo(tx, y + 40);
            ctx.quadraticCurveTo(tx + sway, y + 80, tx + sway * 1.5, y + 120);
            ctx.stroke();
        }

        // 成就文字
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 28px Quicksand';
        ctx.fillText('成就', x - 40, y + 140);
    }

    function drawLeftButtons() {
        // 海底花园按钮
        drawBucketButton(250, 650, '海底花园', '🪣');

        // 图鉴按钮
        drawShellBookButton(400, 670, '图鉴');
    }

    function drawBucketButton(x, y, text, emoji) {
        // 蓝色小水桶
        ctx.fillStyle = '#3498DB';
        ctx.beginPath();
        ctx.moveTo(x - 50, y);
        ctx.lineTo(x + 50, y);
        ctx.lineTo(x + 40, y + 80);
        ctx.lineTo(x - 40, y + 80);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#2980B9';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 桶边
        ctx.fillStyle = '#2980B9';
        ctx.fillRect(x - 55, y - 10, 110, 15);

        // 气泡图标
        ctx.font = '40px Arial';
        ctx.fillText(emoji + ' ' + text, x - 60, y + 130);
    }

    function drawShellBookButton(x, y, text) {
        // 贝壳书形
        ctx.fillStyle = '#F5DEB3';
        ctx.beginPath();
        ctx.ellipse(x, y, 60, 80, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#DEB887';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 书页效果
        ctx.fillStyle = '#FFF8DC';
        ctx.beginPath();
        ctx.ellipse(x - 20, y, 30, 50, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#8B4513';
        ctx.font = 'bold 32px Quicksand';
        ctx.fillText(text, x - 40, y + 120);
    }

    function drawModeSelector() {
        // 珊瑚礁造型主菜单
        ctx.fillStyle = '#4A4A4A';
        roundRect(1500, 300, 320, 450, 30);
        ctx.fill();

        // 珊瑚纹理
        ctx.fillStyle = '#3A3A3A';
        for (let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.arc(1520 + (i % 4) * 70, 330 + Math.floor(i / 4) * 150, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        // 模式按钮
        const modes = ['冒险模式', '迷你游戏', '益智模式'];
        for (let i = 0; i < modes.length; i++) {
            const btnY = 380 + i * 120;
            const isHover = false; // TODO: 悬停检测

            ctx.fillStyle = isHover ? '#5A5A5A' : '#2C3E50';
            roundRect(1550, btnY, 220, 90, 15);
            ctx.fill();

            ctx.fillStyle = '#ECF0F1';
            ctx.font = 'bold 28px Quicksand';
            ctx.fillText(modes[i], 1590, btnY + 55);
        }
    }

    function drawBottomButtons() {
        const btns = [
            { x: 180, y: 920, icon: '🔑', text: '商店', color: '#C0C0C0' },
            { x: 350, y: 920, icon: '👜', text: '选项', color: '#DEB887' },
            { x: 520, y: 920, icon: '🫙', text: '帮助', color: 'rgba(200,230,255,0.5)' },
            { x: 690, y: 920, icon: '⚓', text: '退出', color: '#808080' }
        ];

        for (let btn of btns) {
            // 网袋/容器造型
            ctx.fillStyle = btn.color;
            ctx.beginPath();
            ctx.ellipse(btn.x + 60, btn.y + 60, 55, 55, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.font = '24px Arial';
            ctx.fillText(btn.icon, btn.x + 35, btn.y + 70);
        }
    }

    // ========== 冒险模式绘制 ==========
    function drawAdventure() {
        drawUnderwaterBackground();
        drawBattleUI();
        drawTopBar();
        drawLanes();
        drawBottomCards();
        drawRightPanel();
    }

    function drawBattleUI() {
        // 底部沙子
        const sandGrad = ctx.createLinearGradient(0, 800, 0, GAME_HEIGHT);
        sandGrad.addColorStop(0, '#E8D5A3');
        sandGrad.addColorStop(1, '#C4A66A');
        ctx.fillStyle = sandGrad;
        ctx.fillRect(0, 850, GAME_WIDTH, GAME_HEIGHT - 850);

        // 水草背景
        drawSeaweed(50, 850, 0.7);
        drawSeaweed(1800, 860, 0.9);
    }

    function drawTopBar() {
        // 水面效果条
        ctx.fillStyle = 'rgba(100, 180, 255, 0.3)';
        ctx.fillRect(0, 0, GAME_WIDTH, 140);

        // 波浪效果
        const time = Date.now() / 1000;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath();
        ctx.moveTo(0, 100);
        for (let x = 0; x <= GAME_WIDTH; x += 50) {
            ctx.quadraticCurveTo(x + 25, 80 + Math.sin(time + x * 0.01) * 15, x + 50, 100);
        }
        ctx.lineTo(GAME_WIDTH, 0);
        ctx.lineTo(0, 0);
        ctx.fill();

        // 左上角资源
        drawBubbleResource(60, 40);
        drawPearlResource(200, 40);

        // 中央目标
        drawGoalBoard(GAME_WIDTH / 2 - 200, 30, 400, 80);

        // 右上角信息
        drawLevelInfo(1500, 35);
        drawWaveProgress(1680, 35);
        drawTopButtons();
    }

    function drawBubbleResource(x, y) {
        // 气泡图标
        ctx.fillStyle = 'rgba(100, 200, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(x, y + 30, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#5DADE2';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 小气泡装饰
        ctx.beginPath();
        ctx.arc(x - 15, y + 15, 8, 0, Math.PI * 2);
        ctx.arc(x + 12, y + 40, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 36px Quicksand';
        ctx.fillText(bubbles.toString(), x + 60, y + 50);
    }

    function drawPearlResource(x, y) {
        // 珍珠图标
        ctx.fillStyle = '#FFF8DC';
        ctx.beginPath();
        ctx.arc(x, y + 30, 25, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFE4B5';
        ctx.beginPath();
        ctx.arc(x - 5, y + 25, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 28px Quicksand';
        ctx.fillText('×' + pearls, x + 40, y + 45);
    }

    function drawGoalBoard(x, y, w, h) {
        // 告示牌
        ctx.fillStyle = '#8B4513';
        roundRect(x, y, w, h, 10);
        ctx.fill();

        ctx.fillStyle = '#DEB887';
        ctx.font = 'bold 24px Quicksand';
        ctx.fillText('🎯 阻止害虫入侵你的海底小屋！', x + 30, y + 50);
    }

    function drawLevelInfo(x, y) {
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 28px Quicksand';
        ctx.fillText('关卡 ' + currentLevel, x, y + 40);
    }

    function drawWaveProgress(x, y) {
        ctx.fillStyle = '#87CEEB';
        ctx.font = '24px Quicksand';
        ctx.fillText('第 ' + currentWave + ' 波 / 共 ' + totalWaves + ' 波', x, y + 40);
    }

    function drawTopButtons() {
        // 暂停按钮
        ctx.fillStyle = isPaused ? '#E74C3C' : 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(1750, 80, 35, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = isPaused ? '#C0392B' : '#333';
        ctx.font = '28px Arial';
        ctx.fillText('⏸', 1735, 92);

        // 加速按钮
        ctx.fillStyle = isSpeedUp ? '#27AE60' : 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.arc(1850, 80, 35, 0, Math.PI * 2);
        ctx.fill();

    function drawLanes() {
        // 5条进攻通道
        const laneWidth = 280;
        const laneStartX = 100;
        const laneStartY = 200;
        const laneHeight = 600;

        for (let i = 0; i < 5; i++) {
            const laneX = laneStartX + i * laneWidth;

            // 通道背景（半透明水流效果）
            ctx.fillStyle = 'rgba(100, 180, 255, 0.1)';
            ctx.fillRect(laneX + 20, laneStartY, laneWidth - 40, laneHeight);

            // 水流线
            const time = Date.now() / 1000;
            ctx.strokeStyle = 'rgba(150, 220, 255, 0.3)';
            ctx.lineWidth = 2;
            for (let j = 0; j < 3; j++) {
                ctx.beginPath();
                ctx.moveTo(laneX + 40, laneStartY + 50 + j * 200);
                for (let x = 0; x < laneWidth - 80; x += 20) {
                    const waveY = Math.sin(time * 3 + x * 0.05 + i + j) * 10;
                    ctx.lineTo(laneX + 40 + x, laneStartY + 50 + j * 200 + waveY);
                }
                ctx.stroke();
            }

            // 放置区域提示
            if (selectedCard) {
                ctx.fillStyle = 'rgba(255, 255, 100, 0.2)';
                ctx.fillRect(laneX + 20, laneStartY, laneWidth - 40, laneHeight);
            }

            // 已放置的守卫鱼
            for (let defender of placedDefenders) {
                if (defender.x >= laneX && defender.x < laneX + laneWidth) {
                    drawDefender(defender);
                }
            }
        }

        // 左侧海底小屋
        drawBeachHouse(30, 300);

        // 右侧敌人生成区提示
        ctx.fillStyle = 'rgba(255, 100, 100, 0.2)';
        ctx.fillRect(GAME_WIDTH - 80, 200, 80, 600);

        ctx.fillStyle = '#FF6B6B';
        ctx.font = '20px Quicksand';
        ctx.save();
        ctx.translate(GAME_WIDTH - 40, 500);
        ctx.rotate(Math.PI / 2);
        ctx.fillText('敌人生成区 →', 0, 0);
        ctx.restore();
    }

    function drawBeachHouse(x, y) {
        // 海底小屋
        ctx.fillStyle = '#DEB887';
        // 屋顶
        ctx.beginPath();
        ctx.moveTo(x, y + 100);
        ctx.lineTo(x + 80, y);
        ctx.lineTo(x + 160, y + 100);

        ctx.fill();

        // 墙体
        ctx.fillStyle = '#F5DEB3';
        ctx.fillRect(x + 10, y + 100, 140, 120);

        // 门
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(x + 60, y + 140, 40, 80);

        // 窗户
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(x + 25, y + 120, 30, 30);
        ctx.fillRect(x + 105, y + 120, 30, 30);

        // 贝壳护盾（3个）
        for (let i = 0; i < 3; i++) {
            ctx.fillStyle = i === 0 ? '#FFD700' : i === 1 ? '#C0C0C0' : '#CD7F32';

    function drawDefender(defender) {
        const x = defender.x;
        const y = defender.y;
        const type = defender.type;

        // 鱼身体
        ctx.fillStyle = type.color;
        ctx.beginPath();
        ctx.ellipse(x, y, 40, 25, 0, 0, Math.PI * 2);
        ctx.fill();

        // 鱼眼睛
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(x + 15, y - 5, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(x + 18, y - 5, 6, 0, Math.PI * 2);
        ctx.fill();

        // 鱼鳍
        ctx.fillStyle = type.color;
        ctx.beginPath();
        ctx.moveTo(x, y - 20);
        ctx.lineTo(x - 10, y - 45);
        ctx.lineTo(x + 10, y - 35);
        ctx.closePath();
        ctx.fill();

        // 攻击指示（如果有攻击动画）
        if (Date.now() - defender.lastAttack < 300) {
            ctx.strokeStyle = '#FF0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
            ctx.stroke();

    function drawCard(x, y, w, h, card, isCoolingDown) {
        // 卡牌背景（水草叶子造型）
        const grad = ctx.createLinearGradient(x, y, x, y + h);
        grad.addColorStop(0, '#3CB371');
        grad.addColorStop(1, '#228B22');
        ctx.fillStyle = grad;
        roundRect(x, y, w, h, 15);
        ctx.fill();

        // 冷却效果
        if (isCoolingDown) {
            const coolRatio = card.cooldownTimer / card.cooldown;
            ctx.fillStyle = 'rgba(0, 0, 100, 0.5)';
            ctx.fillRect(x, y + h * (1 - coolRatio), w, h * coolRatio);
        }

        // 卡牌边框
        ctx.strokeStyle = isCoolingDown ? '#666' : '#FFD700';
        ctx.lineWidth = 3;
        roundRect(x, y, w, h, 15);
        ctx.stroke();

        // 守卫鱼图标
        ctx.fillStyle = card.color;
        ctx.beginPath();
        ctx.ellipse(x + w / 2, y + 50, 35, 22, 0, 0, Math.PI * 2);
        ctx.fill();

        // 鱼眼睛
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(x + w / 2 + 12, y + 45, 8, 0, Math.PI * 2);
        ctx.fill();

        // 卡牌名称
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 20px Quicksand';
        ctx.fillText(card.name, x + 10, y + 100);

        // 费用
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 24px Quicksand';
        ctx.fillText('🫧 ' + card.cost, x + 15, y + 135);
    }

    // ========== 工具函数 ==========
    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ========== 游戏循环 ==========
    let lastTime = 0;

    function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        // 更新卡牌冷却
        updateCards(deltaTime);

        // 绘制
        draw();

        requestAnimationFrame(gameLoop);
    }

    function updateCards(deltaTime) {
        for (let card of cardDeck) {
            if (card.cooldownTimer > 0) {
                card.cooldownTimer = Math.max(0, card.cooldownTimer - deltaTime);
            }
        }

        ];
        for (let i = 0; i < 18; i++) {
            const type = fishTypes[i % fishTypes.length];
            schoolOfFish.push({
                x: Math.random() * GAME_WIDTH,
                y: 200 + Math.random() * 500,
                baseY: 200 + Math.random() * 500,
                vx: (Math.random() > 0.5 ? 1 : -1) * type.speed,
                size: type.size + Math.random() * 5,
                color: type.color,
                phase: Math.random() * Math.PI * 2,
                amplitude: 20 + Math.random() * 30,
                frequency: 0.02 + Math.random() * 0.02
            });
        }
        menuDecorations = [
            { type: 'treasure', x: 900, y: 920 },
            { type: 'shell1', x: 1200, y: 950 },
            { type: 'shell2', x: 650, y: 960 },
            { type: 'starfish', x: 450, y: 940 },
            { type: 'seaurchin', x: 1100, y: 930 }
        ];

    function updateMenuFish() {
        const time = Date.now() / 1000;
        for (let fish of schoolOfFish) {
            fish.x += fish.vx;
            fish.y = fish.baseY + Math.sin(time * fish.frequency * 100 + fish.phase) * fish.amplitude;
            if (fish.vx > 0 && fish.x > GAME_WIDTH + 50) fish.x = -50;
            else if (fish.vx < 0 && fish.x < -50) fish.x = GAME_WIDTH + 50;
        }
    }

    function drawMenuFish() {
        for (let fish of schoolOfFish) {
            const { x, y, size, color, vx } = fish;
            const facing = vx > 0 ? 1 : -1;
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(facing, 1);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-size * 0.8, 0);
            ctx.lineTo(-size * 1.5, -size * 0.5);
            ctx.lineTo(-size * 1.5, size * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(0, -size * 0.5);
            ctx.lineTo(-size * 0.3, -size * 1.0);
            ctx.lineTo(-size * 0.5, -size * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(size * 0.4, -size * 0.1, size * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(size * 0.45, -size * 0.1, size * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function drawTreasureChest(x, y) {
        const time = Date.now() / 1000;
        const glow = 0.5 + Math.sin(time * 2) * 0.3;
        ctx.fillStyle = '#8B4513';
        roundRect(x - 40, y - 20, 80, 50, 8);
        ctx.fill();
        ctx.fillStyle = '#A0522D';
        ctx.beginPath();
        ctx.ellipse(x, y - 20, 45, 25, 0, Math.PI, 0);

        ctx.fillRect(x - 5, y - 30, 10, 60);
        ctx.fillRect(x - 30, y - 10, 60, 8);
        ctx.fillStyle = `rgba(255, 215, 0, ${glow * 0.3})`;
        ctx.beginPath();
        ctx.arc(x, y, 50, 0, Math.PI * 2);
        ctx.fill();
        for (let i = 0; i < 5; i++) {
            const angle = time + i * Math.PI * 0.4;
            const dist = 30 + Math.sin(time * 3 + i) * 10;
            const px = x + Math.cos(angle) * dist;
            const py = y - 20 + Math.sin(angle) * dist * 0.5;
            ctx.fillStyle = `rgba(255, 215, 0, ${0.5 + Math.sin(time * 4 + i) * 0.3})`;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);

    function drawStarfish(x, y) {
        const time = Date.now() / 1000;
        const rotation = time * 0.3;
        const pulse = 1 + Math.sin(time * 2) * 0.1;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
            const outerX = Math.cos(angle) * 30;
            const outerY = Math.sin(angle) * 30;
            const innerAngle = angle + Math.PI / 5;
            const innerX = Math.cos(innerAngle) * 12;
            const innerY = Math.sin(innerAngle) * 12;
            if (i === 0) ctx.moveTo(outerX, outerY);
            else ctx.lineTo(outerX, outerY);
            ctx.lineTo(innerX, innerY);
        }
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#FFE4B5';
        for (let i = 0; i < 5; i++) {
            const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
            ctx.beginPath();
            ctx.arc(Math.cos(angle) * 15, Math.sin(angle) * 15, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawSeaUrchin(x, y) {
        const time = Date.now() / 1000;
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
        ctx.fill();
        const spineCount = 16;
        for (let i = 0; i < spineCount; i++) {
            const angle = (i * Math.PI * 2) / spineCount + time * 0.5;
            const length = 25 + Math.sin(time * 3 + i) * 5;
            ctx.strokeStyle = i % 2 === 0 ? '#D4A574' : '#C4956A';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * 20, Math.sin(angle) * 20);
            ctx.lineTo(Math.cos(angle) * length, Math.sin(angle) * length);
            ctx.stroke();
        }
        ctx.fillStyle = '#A0522D';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

        for (let i = 0; i < 30; i++) {
            const px = (i * 173 + Math.sin(time * 0.5 + i) * 50) % GAME_WIDTH;
            const py = (i * 97 + Math.cos(time * 0.3 + i) * 30) % GAME_HEIGHT;
            const size = 2 + (i % 4);
            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fill();
        }
        const waveGrad = ctx.createLinearGradient(0, 0, 0, 150);
        waveGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
        waveGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = waveGrad;
        ctx.fillRect(0, 0, GAME_WIDTH, 150);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        for (let x = 0; x < GAME_WIDTH; x += 80) {
            const waveY = 50 + Math.sin(time * 2 + x * 0.02) * 20;
            ctx.beginPath();
            ctx.ellipse(x, waveY, 40, 8, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Hook into existing functions
    const originalInit = init;
    init = function() {
        originalInit();
        initMenuFish();
    };

    const originalGameLoop = gameLoop;
    gameLoop = function(timestamp) {
        updateMenuFish();
        originalGameLoop(timestamp);
    };

    const originalDrawMenu = drawMenu;
    drawMenu = function() {
        drawEnhancedUnderwaterBackground();
        drawLightRays();
        originalDrawMenu();
        drawMenuFish();
        drawMenuDecorations();
        drawAnimatedTitle();
        drawSwimmingDuck();
        drawJellyfishCluster();
        drawMenuBadge();
    };
    }

    // ========== 启动游戏 ==========
    init();
})();
</script>
